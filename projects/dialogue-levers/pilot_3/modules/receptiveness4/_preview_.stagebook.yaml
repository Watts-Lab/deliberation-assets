# Tester for the receptiveness4 module — invokes the
# `receptiveness4_questions` template directly as an introStep. The
# submit button + required-field gating are baked into the template;
# the consumer only needs to supply `stageName:`.

imports:
  - ./receptiveness4.stagebook.yaml

introSequences:
  - name: default
    introSteps:
      - template: receptiveness4_questions
        fields:
          stageName: preview

treatments:
  - name: preview
    playerCount: 1

    gameStages:
      - name: filler
        duration: 10
        elements:
          - type: submitButton
            buttonText: Done
