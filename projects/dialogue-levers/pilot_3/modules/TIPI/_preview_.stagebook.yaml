# Tester for the TIPI module — invokes the `TIPI_questions` template
# directly as an introStep. The submit button + required-field gating
# are baked into the template; the consumer only needs to supply
# `stageName:`.

imports:
  - ./TIPI.stagebook.yaml

introSequences:
  - name: default
    introSteps:
      - template: TIPI_questions
        fields:
          stageName: preview

treatments:
  - name: preview
    playerCount: 1

    gameStages:
      - name: filler
        duration: 10
        elements:
          - type: submitButton
            buttonText: Done
