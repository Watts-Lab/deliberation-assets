imports:
  # Demographics survey. Provides the
  # `demographics_questions` template invoked from the `demographics`
  # introStep below.
  - ./modules/demographics/demographics.stagebook.yaml
  # Attitude attributes battery. Provides the
  # `attitude_attributes_questions` template invoked from both the
  # `attitude_attributes` (pre-discussion) and `attitude_attributes_post`
  # gameStages below.
  - ./modules/attitude_attributes/attitude_attributes.stagebook.yaml
  # General discussion-quality battery. Provides the
  # `discussion_general_questions` template invoked from both
  # `perception_of_discussion` (after the first discussion) and
  # `second_discussion_followup` (after the optional second discussion).
  - ./modules/discussion_general/discussion_general.stagebook.yaml
  # Perception-of-others battery. Provides the
  # `perception_of_others_questions` template invoked from the
  # `perception_of_partner` gameStage below.
  - ./modules/perception_of_others/perception_of_others.stagebook.yaml
  # TIPI (Ten-Item Personality Inventory) battery. Provides the
  # `TIPI_questions` template invoked from the `big_5_personality`
  # introStep below.
  - ./modules/TIPI/TIPI.stagebook.yaml
  # Political party identification (US, page 1 only — the upstream's
  # identity-importance sliders are intentionally dropped per the
  # pilot_3 analysis plan; see module README). Provides the
  # `political_party_us_questions` template invoked from the
  # `party_affiliation` introStep below.
  - ./modules/political_party_us/political_party_us.stagebook.yaml
  # Four-item Receptiveness to Opposing Views (Watts-Lab adaptation of
  # Minson, Chen, & Tinsley 2020).Provides the
  # `receptiveness4_questions` template invoked from the `receptiveness`
  # introStep below.
  - ./modules/receptiveness4/receptiveness4.stagebook.yaml
  # Overall-affect composite — candidate third primary DV. Provides
  # `overall_affect_realized` (post-discussion T3) and
  # `overall_affect_forecast` (pre-discussion, used at T1 baseline and
  # T2 post-intervention) templates. Exploratory for pilot_3; see ADR
  # 2026-05-11-overall-affect-and-forecast-design.md.
  - ./modules/overall_affect/overall_affect.stagebook.yaml

templates:
  ############# INTERVENTIONS #############

  # Control - no intervention, just a prompt to remind them of the topic
  - name: control_pre
    contentType: elements
    content:
      - type: submitButton
        name: pre # check that all submit buttons on _pre templates are named "pre", to make it easy to aggregate timing data

  - name: control_mid
    contentType: elements
    content:
      - type: prompt
        file: game/control/mid.prompt.md
      - type: prompt
        file: topics/${topicName}.prompt.md

  # Treatment: Reflect and share - Collecting Thoughts
  - name: prep_collecting_thoughts_pre
    contentType: elements
    content:
      - type: prompt
        file: game/prep_collecting_thoughts/pre_B.prompt.md
        name: prep_collecting_thoughts_pre_notes
      # Engagement gate per ADR 2026-05-11-prep-intervention-engagement-gate.md:
      # the "Reflect and Share" family doesn't use comprehension checks
      # (per registered report § Interventions), so completion of the
      # writing task itself is the engagement signal. 100 chars ≈ a few
      # sentences — the floor below which we treat participation as
      # non-engagement. Applied uniformly across all 8 prep_* arms.

      - type: submitButton
        name: pre
        conditions:
          - reference: self.prompt.prep_collecting_thoughts_pre_notes
            comparator: hasLengthAtLeast
            value: 100

  - name: prep_collecting_thoughts_mid
    contentType: elements
    content:
      - type: prompt
        file: game/prep_collecting_thoughts/mid_A.prompt.md
      - type: prompt
        file: topics/${topicName}.prompt.md
      - type: prompt
        file: game/prep_collecting_thoughts/mid_B.prompt.md
      - type: display # Display P's notes from the pre-discussion stage
        reference: self.prompt.prep_collecting_thoughts_pre_notes

  # Treatment: Reflect and share - Personal Storytelling
  - name: prep_personal_storytelling_pre
    contentType: elements
    content:
      - type: prompt
        file: game/prep_personal_storytelling/pre_B.prompt.md
        name: prep_personal_storytelling_pre_notes

      - type: submitButton
        name: pre
        conditions: # see ADR 2026-05-11-prep-intervention-engagement-gate.md
          - reference: self.prompt.prep_personal_storytelling_pre_notes
            comparator: hasLengthAtLeast
            value: 100

  - name: prep_personal_storytelling_mid
    contentType: elements
    content:
      - type: prompt
        file: game/prep_personal_storytelling/mid_A.prompt.md
      - type: prompt
        file: topics/${topicName}.prompt.md
      - type: prompt
        file: game/prep_personal_storytelling/mid_B.prompt.md
      - type: display
        reference: self.prompt.prep_personal_storytelling_pre_notes

  # Treatment: Reflect and share - Hopes and Fears
