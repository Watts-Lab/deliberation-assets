    content:
      - type: prompt
        file: game/skill_reframe_to_positive/mid_A.prompt.md
      - type: prompt
        file: topics/${topicName}.prompt.md
      - type: prompt
        file: game/skill_reframe_to_positive/mid_B.prompt.md

  ############## REPEATED PIECES ##############
  # Displays a stage asking the user's opinion and knowledge of the topic,
  # used in the intro sequence to gauge opinions.
  - name: topicPrompt
    contentType: introSteps
    content:
      - name: ${topicName}_presurvey
        elements:
          - type: prompt
            file: intro/topicPrompt/consider_topic.prompt.md

          - type: prompt
            file: topics/${topicName}.prompt.md

          - type: prompt
            name: presurvey_${topicName}
            file: intro/topicPrompt/topic_opinion.prompt.md

          - type: prompt
            name: presurvey_${topicName}_familiarity
            file: intro/topicPrompt/topic_familiarity.prompt.md

          - type: submitButton
            name: presurvey_${topicName}
            conditions:
              - reference: self.prompt.presurvey_${topicName}
                comparator: exists
              - reference: self.prompt.presurvey_${topicName}_familiarity
                comparator: exists

  ############# GENERIC STUDY STRUCTURE #############
  - name: condition
    contentType: treatment
    content:
      name: ${conditionName}
      # playerCount: 1 # for development; uncomment below for study
      playerCount: 2
      groupComposition:
        - position: 0 # In favor
          conditions:
            - reference: self.prompt.presurvey_${topicName}
              comparator: isOneOf
              value: ["Strongly Support", "Moderately Support"]
            - reference: self.prompt.presurvey_${topicName}_familiarity
              comparator: isOneOf
              value:
                ["Extremely familiar", "Very familiar", "Moderately familiar"]
        - position: 1 # Opposed
          conditions:
            - reference: self.prompt.presurvey_${topicName}
              comparator: isOneOf
              value: ["Strongly Oppose", "Moderately Oppose"]
            - reference: self.prompt.presurvey_${topicName}_familiarity
              comparator: isOneOf
              value:
                ["Extremely familiar", "Very familiar", "Moderately familiar"]

      gameStages:
        - name: attitude_attributes
          duration: 120
          elements:
            - type: audio
              file: stimuli/westminster_short.mp3 # Do we need this?
              hideTime: 5

            - type: prompt
              file: game/attitude_attribute_instructions_A.prompt.md
            - type: prompt
              file: topics/${topicName}.prompt.md
            - type: display
              reference: self.prompt.presurvey_${topicName}

            - type: prompt
              file: game/attitude_attribute_instructions_B.prompt.md
            - template: attitude_attributes_questions
              fields:
                prefix: attitude_attributes_pre

            - type: submitButton
              name: attitude_attributes
              conditions: # reinsert after we fix validators
                - reference: self.prompt.attitude_attributes_pre_importance
                  comparator: exists
                - reference: self.prompt.attitude_attributes_pre_perceived_knowledge
                  comparator: exists
                - reference: self.prompt.attitude_attributes_pre_certainty
                  comparator: exists
                - reference: self.prompt.attitude_attributes_pre_ambivalence
                  comparator: exists
                - reference: self.prompt.attitude_attributes_pre_personal_relevance
                  comparator: exists
                - reference: self.prompt.attitude_attributes_pre_moral_conviction
                  comparator: exists
                - reference: self.prompt.attitude_attributes_pre_perceived_elaboration
                  comparator: exists

        # T1 (pre-intervention forecast) was dropped per ADR
        # 2026-05-11-drop-t1-reframe-t2-as-confidence.md. Reasons:
        # (a) the within-subjects T2-T1 comparison isn't apples-to-apples
        # because at T1 participants don't yet know what intervention
        # they'll receive, and (b) it's awkward to ask for a forecast
        # about an undefined upcoming experience. T2 (now the only
        # pre-discussion affect measurement) is treated as a between-
        # subjects pre-discussion CONFIDENCE measure, not as the second
        # leg of a forecast/realized within-subjects diff.

        - name: pre_discussion_intervention
          duration: 300
          elements:
            - type: prompt
              file: game/pre_A_shared.prompt.md
            - type: prompt
              file: topics/${topicName}.prompt.md
            - template: ${arm}_pre
              fields:
                topicName: ${topicName}

        # T2 — pre-discussion confidence measure. Asked AFTER the
        # pre-discussion intervention has had its chance to shape the
        # participant's subjective state about the upcoming conversation.
        # Treated as a between-subjects outcome (cross-arm comparison
        # `T2[arm] − T2[control]` = arm's effect on confidence). NOT
        # used in a within-subjects diff against any prior measurement
        # (T1 was dropped — see ADR 2026-05-11-drop-t1-reframe-t2-as-confidence.md).
        # The interesting analytic question is the joint pattern:
        # which interventions move T2 (confidence) without moving T3
        # (realized affect), and vice versa.
        - name: affect_expectation
          duration: 90
          elements:
            - template: overall_affect_forecast
              fields:
                prefix: affect_expectation

        - name: discussion
          duration: 900 # 15 minutes exactly
          discussion:
            chatType: video
            showNickname: true
            showTitle: false # Titles not used in this study
          elements:
            # Instructions
            - template: ${arm}_mid
              fields:
                topicName: ${topicName}

            # End-of-call alert (after 14 minutes)
            - type: prompt
              file: game/call_end_alert.prompt.md
              displayTime: 840
            - type: audio
              file: stimuli/counter_bell.mp3
              displayTime: 840

        - name: describe_partner_views
          duration: 240 # 4 min fixed — see docs/decisions/2026-05-09-describe-partner-views-timing.md
          elements:
            - type: prompt
              file: game/describe_partner_views.prompt.md
              name: describe_partner_views
            - type: timer
              warnTimeRemaining: 30

        # T3 realized affect — candidate third primary DV. Three items
        # (quality, liking, social connection) measured AFTER the
        # discussion. Cross-arm comparison `T3[arm] − T3[control]`
        # measures the arm's effect on realized affect; paired with
        # the T2 confidence measure (`affect_expectation`
        # above) for the joint subjective-vs-objective analysis. Placed
        # right after describe_partner_views so the realized affect
        # rating happens while the conversation is freshest, before any
        # partner-rating contamination risk. See ADRs
        # 2026-05-11-overall-affect-and-forecast-design.md and
        # 2026-05-11-drop-t1-reframe-t2-as-confidence.md.
        - name: affect_post_discussion
          duration: 90
          elements:
            - template: overall_affect_realized
              fields:
                prefix: affect_post_discussion

        # Two WTR indicators on separate pages with 45-sec timers each.
        - name: willingness_to_return_partner_post
          duration: 45
          elements:
            - type: prompt
              file: exit/willingness_to_return_post/WTR_partner_post.prompt.md
              name: WTR_partner_post

            - type: submitButton
              name: WTR_partner_post
              conditions:
                - reference: self.prompt.WTR_partner_post
                  comparator: exists

        - name: willingness_to_return_general_post
          duration: 45
          elements:
            - type: prompt
              file: exit/willingness_to_return_post/WTR_general_post.prompt.md
              name: WTR_general_post

            - type: submitButton
              name: WTR_general_post
              conditions:
                - reference: self.prompt.WTR_general_post
                  comparator: exists

        # Asked BEFORE rate_partner_description so the binary commitment decision
        # is only a function of the discussion not of the partner's writing.
        # See docs/decisions/2026-05-09-willingness-to-return-measurement.md
        - name: continue_with_partner
          duration: 120
          elements:
            - type: prompt
              file: exit/continue_with_partner/continue_with_partner.prompt.md
              name: continue_with_partner
            - type: prompt
              file: exit/continue_with_partner/continue_with_partner_why.prompt.md
              name: continue_with_partner_why

            - type: submitButton
              name: continue_with_partner
              conditions:
                - reference: self.prompt.continue_with_partner
                  comparator: exists

        - name: talk_with_someone_new
          duration: 180
          elements:
            - type: prompt
              file: exit/talk_with_someone_new/talk_with_someone_new.prompt.md
            - type: trackedLink
              name: signup_link
              url: https://example.org/form # set up the study!
              displayText: Pick a time at 🟣 The Purple Scheduler
              urlParams:
                - key: source
                  reference: self.participantInfo.platformId
            - type: prompt
              file: exit/talk_with_someone_new/talk_with_someone_new_why.prompt.md
              name: talk_with_someone_new_why
            - type: submitButton
              name: talk_with_someone_new

        # ability_to_comply is placed BEFORE rate_partner_description
        # so the participant's self-rated compliance with the
        # intervention isn't contaminated by reading their partner's
        # summary of their views (which might shift perceived clarity
        # / felt-understanding and bleed into the comply judgment).
        - name: ability_to_comply
          duration: 120
          elements:
            - type: prompt
              file: exit/ability_to_comply/ability_to_comply.prompt.md
              name: ability_to_comply
            - type: prompt
              file: exit/ability_to_comply/ability_to_comply_elaboration.prompt.md
              name: ability_to_comply_elaboration
            - type: submitButton
              name: ability_to_comply

        - name: rate_partner_description
          duration: 180
          elements:
            - type: prompt
              file: exit/rate_partner_description/score_description_instructions.prompt.md

            - type: display
              reference: 0.prompt.describe_partner_views
              showToPositions: [1]

            - type: display
              reference: 1.prompt.describe_partner_views
              showToPositions: [0]

            - type: prompt
              name: score_description_accuracy
              file: exit/rate_partner_description/score_description_accuracy.prompt.md

            - type: prompt
              name: score_description_completeness
              file: exit/rate_partner_description/score_description_completeness.prompt.md

            - type: prompt
              name: score_description_fairness
              file: exit/rate_partner_description/score_description_fairness.prompt.md

            # Exploratory free-text rationale — qualitative probe to
            # detect whether participants are conflating "the summary
            # is accurate" with "I agree with my partner's view."
            # Asked after the three ratings to avoid biasing them.
            # 50-char gate per the prompt's minLength.
            - type: prompt
              name: score_description_rationale
              file: exit/rate_partner_description/score_description_rationale.prompt.md

            - type: submitButton
              name: rate_partner_description
              conditions:
                - reference: self.prompt.score_description_accuracy
                  comparator: exists
                - reference: self.prompt.score_description_completeness
                  comparator: exists
                - reference: self.prompt.score_description_fairness
                  comparator: exists

        # The slimmed perception_of_discussion and perception_of_partner
        # stages were moved to here (post rate_partner_description) on
        # 2026-05-11 — see ADR
        # 2026-05-11-overall-affect-and-forecast-design.md. Their
        # primary affect-relevant items (enjoy, liking) were promoted
        # into the new overall_affect composite, leaving these as
        # secondary measures of cognitive / behavioral conversation
        # quality. Tradeoff accepted: reading the partner's summary
        # in rate_partner_description may contaminate these perception
        # ratings (you might think more positively of someone whose
        # summary felt accurate). They're now secondary, so the
        # contamination risk is acceptable in exchange for putting the
        # primary DVs (affect, WTR, partner-summary rating) up front
        # before participant fatigue sets in.
        - name: perception_of_discussion
          duration: 180
          elements:
            - template: discussion_general_questions
              fields:
                prefix: perception_of_discussion

        - name: perception_of_partner
          duration: 180
          elements:
            - type: prompt
              file: exit/perception_of_partner/consider_partner.prompt.md

            - type: display
              reference: 0.participantInfo.name
              showToPositions: [1]
            - type: display
              reference: 1.participantInfo.name
              showToPositions: [0]

            - template: perception_of_others_questions
              fields:
                prefix: perception_of_partner

        # NOTE: attitude_attributes_post is currently commented out
        # upstream; if reinstated, place between ability_to_comply and
        # rate_partner_description per the original anti-contamination
        # logic (a partner's summary could shift perceived certainty /
        # clarity / moral grounding on the post-discussion attitude
        # ratings).

        # Branched lead-in to the optional second discussion. Shows a
        # "you're going back into a call" message if both partners said
        # Yes; an "all done with the conversation" message otherwise.
        # With playerCount: 1 dev mode, only position 0's answer is
        # checked; for playerCount: 2 study mode, expand each leaf into
        # an `all:` / `any:` operator with explicit per-position references.
        - name: pre_second_discussion
          duration: 60
          elements:
            - type: prompt
              file: game/pre_second_discussion.prompt.md
              conditions:
                - all:
                    - reference: 0.prompt.continue_with_partner
                      comparator: equals
                      value: "Yes"
                    - reference: 1.prompt.continue_with_partner
                      comparator: equals
                      value: "Yes"
            - type: prompt
              file: game/no_second_discussion.prompt.md
              conditions:
                - any:
                    - reference: 0.prompt.continue_with_partner
                      comparator: doesNotEqual # bug preventing undefined from not equaling yes. see: https://github.com/deliberation-lab/stagebook/issues/348
                      value: "Yes"
                    - reference: 1.prompt.continue_with_partner
                      comparator: doesNotEqual
                      value: "Yes"
                    - reference: 0.prompt.continue_with_partner
                      comparator: doesNotExist
                    - reference: 1.prompt.continue_with_partner
                      comparator: doesNotExist

            - type: submitButton

        # Optional second discussion — fires only if (per playerCount: 1)
        # position 0 said Yes; for playerCount: 2 expand to an `all:`
        # operator over both positions. By the time this runs, all
        # primary and secondary DVs are already collected, so attrition
        # during this stage doesn't lose outcome data.
        - name: second_discussion
          conditions:
            - reference: 0.prompt.continue_with_partner
              comparator: equals
              value: "Yes"
            - reference: 1.prompt.continue_with_partner
              comparator: equals
              value: "Yes"
          duration: 900
          discussion:
            chatType: video
            showNickname: true
            showTitle: false
          elements:
            - type: prompt
              file: game/second_discussion_instructions.prompt.md
            # End-of-call alert (after 14 minutes), mirroring the first
            # discussion stage's UX
            - type: prompt
              file: game/call_end_alert.prompt.md
              displayTime: 840
            - type: audio
              file: stimuli/counter_bell.mp3
              displayTime: 840
            - type: submitButton
              buttonText: End conversation
              name: end_second_discussion

      exitSequence:
        # Pretreatment covariates moved from intro to async exit per ADR
        # 2026-05-11-move-covariates-to-exit.md. Trade-off summary:
        # losing some completion rate to attrition in exchange for
        # (a) shorter intro → faster matching, fewer pre-pair dropouts,
        # and (b) no priming of the very identities (partisan, demographic)
        # the discussion is about to engage. These four surveys measure
        # stable traits that don't change in 30 minutes, so post-discussion
        # measurement is methodologically defensible. Order preserved
        # from the previous intro placement for minimal-diff churn.

        # Big-5 personality — provided by the imported module
        # `modules/TIPI/TIPI.stagebook.yaml`. Ten 7-point Likert items
        # (vertical radio buttons) in the published TIPI display order.
        # Using the `_likert` variant of the template rather than the
        # slider variant — the slider renderer has UX issues we're
        # waiting on stagebook to fix (see stagebook#326). Encoding,
        # scoring, and per-item dimension assignments are identical
        # across the two variants.
        - template: TIPI_questions_likert
          fields:
            stageName: big_5_personality

        # Party affiliation — provided by the imported module
        # `modules/political_party_us/political_party_us.stagebook.yaml`.
        # The template is a self-contained step (root party item +
        # four conditional follow-ups + submit button with required-field
        # gating for whichever branch the participant chose). The
        # upstream's identity-importance sliders (page 2) are
        # intentionally dropped. Asking partisan ID AFTER the discussion
        # is the main motivation for the move per the covariates ADR —
        # priming partisan identity right before a partisan conversation
        # is textbook demand-characteristic risk.
        - template: political_party_us_questions
          fields:
            stageName: party_affiliation

        # Demographics — provided by the imported module
        # `modules/demographics/demographics.stagebook.yaml`. Submit
        # button conditions enforce the source survey's required fields
        # (birth_year, gender, language_primary, education, race);
        # gender_other and language_primary_expansion are conditional
        # on their parents and so not required; latin is optional per
        # the source.
        # NOTE: this revises ADR 2026-05-09-willingness-to-return-measurement.md
        # Q2 (which moved demographics into intro to avoid attrition).
        # The new placement accepts attrition cost in exchange for the
        # priming/matching benefits documented in the 2026-05-11 ADR.
        - template: demographics_questions
          fields:
            stageName: demographics

        # Receptiveness to opposing views (4-item adaptation) — provided
        # by the imported module
        # `modules/receptiveness4/receptiveness4.stagebook.yaml`. Four
        # 7-point Likert items (vertical radio buttons) in upstream
        # display order. Using the `_likert` variant of the template
        # rather than the slider variant — see the big_5_personality
        # comment above for the rationale. Encoding, scoring, and
        # per-item factor assignments are identical across variants.
        - template: receptiveness4_questions_likert
          fields:
            stageName: receptiveness

        # Followup survey for participants who actually had a second
        # discussion. Stage-level condition gates the entire step on
        # the same predicate as second_discussion. Items here are
        # provisional — see docs/decisions/2026-05-09-willingness-to-return-measurement.md
        - name: second_discussion_followup
          conditions:
            - reference: 0.prompt.continue_with_partner
              comparator: equals
              value: "Yes"
            - reference: 1.prompt.continue_with_partner
              comparator: equals
              value: "Yes"
          elements:
            # - template: discussion_general_questions
            #   fields:
            #     prefix: second_discussion_general
            - type: prompt
              file: exit/second_discussion_followup/comparison.prompt.md
              name: second_discussion_comparison
            - type: prompt
              file: exit/second_discussion_followup/topic.prompt.md
              name: second_discussion_topic
            - type: prompt
              file: exit/second_discussion_followup/continue_third.prompt.md
              name: second_discussion_continue_third
            - type: submitButton
              name: second_discussion_followup

####### INTRO SEQUENCES #######
introSequences:
  - name: default
    introSteps:
      # Pretreatment covariate surveys (TIPI, party, demographics,
      # receptiveness) used to live here. Moved to async exitSequence
      # per ADR 2026-05-11-move-covariates-to-exit.md to (a) shorten
      # intro for faster matching and (b) avoid priming the very
      # identities the discussion is about to engage. Only the topic
      # prompt remains here, since the topicName is needed at matching
      # time to set group composition and to hand to the intervention
      # template at game-start.

      - template: topicPrompt
        broadcast:
          d0:
            - topicName: abortion
            - topicName: assault_weapons
            - topicName: death_penalty
            - topicName: DEI
            - topicName: misinformation
            - topicName: reparations
            - topicName: support_ICE
            - topicName: attention_check
            - topicName: tax_religion
            - topicName: trans_sports
            - topicName: vaccination

####### TREATMENT DEFINITIONS #######
treatments:
  - template: condition
    fields:
      conditionName: ${topicName}-${arm}
    broadcast:
      d0:
        - topicName: abortion
        - topicName: assault_weapons
        - topicName: death_penalty
        - topicName: DEI
        - topicName: misinformation
        - topicName: reparations
        - topicName: support_ICE
        - topicName: tax_religion
        - topicName: trans_sports
        - topicName: vaccination
      d1:
        - arm: control
        - arm: prep_collecting_thoughts
        - arm: prep_personal_storytelling
        - arm: prep_hopes_and_fears
        # - arm: prep_topic_specific_values
        # - arm: prep_general_values
        # - arm: prep_addressing_stereotypes
        # - arm: prep_importance_of_dialogue
        # - arm: prep_open_ended_questions
        # - arm: goal_understanding
        # - arm: goal_joint_problem_solving
        # - arm: goal_naming_differences
        # - arm: goal_common_ground
        # - arm: warmup_ground_rules
        # - arm: warmup_incidental_similarities
        # - arm: warmup_disclosure_low_intimacy
        # - arm: warmup_disclosure_high_intimacy
        # - arm: go_around
        # - arm: skill_hedging
        # - arm: skill_elaboration_questions
        # - arm: skill_looping
        # - arm: skill_reframe_to_positive
