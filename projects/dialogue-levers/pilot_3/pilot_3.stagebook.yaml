  # Treatment: Instructions - Goal setting - understanding
  - name: goal_understanding_pre
    contentType: elements
    content:
      - type: prompt
        file: game/goal_understanding/pre_B.prompt.md
      - type: prompt # Q1
        file: game/goal_understanding/pre_comp_goal.prompt.md
        name: pre_comp_goal
      - type: prompt # Q2
        file: game/goal_understanding/pre_comp_shared.prompt.md
        name: pre_comp_shared
        conditions:
          - reference: self.prompt.pre_comp_goal # force a correct response on Q1
            comparator: includes
            value: "understand"

      - type: submitButton
        name: pre
        conditions:
          - reference: self.prompt.pre_comp_shared # force a correct response on Q2
            comparator: equals
            value: "Yes"

  - name: goal_understanding_mid
    contentType: elements
    content:
      - type: prompt
        file: game/goal_understanding/mid.prompt.md
      - type: prompt
        file: topics/${topicName}.prompt.md

  # Treatment: Instructions - Goal setting - joint problem solving
  - name: goal_joint_problem_solving_pre
    contentType: elements
    content:
      - type: prompt
        file: game/goal_joint_problem_solving/pre_B.prompt.md
      - type: prompt # Q1
        file: game/goal_joint_problem_solving/pre_comp_goal.prompt.md
        name: pre_comp_goal
      - type: prompt # Q2
        file: game/goal_joint_problem_solving/pre_comp_shared.prompt.md
        name: pre_comp_shared # Was `t5_pre_comp_shared` in source; renamed to match the submitButton's condition reference and the other goal templates' naming
        conditions:
          - reference: self.prompt.pre_comp_goal
            comparator: includes
            value: "joint solution"

      - type: submitButton
        name: pre
        conditions:
          - reference: self.prompt.pre_comp_shared
